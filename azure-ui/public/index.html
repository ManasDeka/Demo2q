<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Azure OpenAI UI</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
textarea { width: 100%; height: 110px; }
button { padding: 10px 16px; margin-top: 10px; cursor: pointer; }
pre { background: #f5f5f5; padding: 12px; white-space: pre-wrap; }
.row { margin-bottom: 12px; }
</style>
</head>
<body>
<h2>Ask your model</h2>

<div class="row">
<textarea id="q" placeholder="Type your question here..."></textarea>
</div>

<button onclick="ask()">Ask</button>

<h3>Response</h3>
<pre id="out">Waiting...</pre>

<script>
async function ask() {
const question = document.getElementById("q").value.trim();
const out = document.getElementById("out");

if (!question) {
out.textContent = "Please type a question.";
return;
}

out.textContent = "Loading...";

try {
const res = await fetch("/ask", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ question })
});

const data = await res.json();
out.textContent = JSON.stringify(data, null, 2);
} catch (e) {
out.textContent = "Error calling server: " + e;
}
}
</script>
</body>
</html>
